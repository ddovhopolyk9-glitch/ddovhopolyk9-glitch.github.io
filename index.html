<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk Magazine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Хедер / Шапка сайту */
        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 25px 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        header .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 14px;
            cursor: pointer;
        }

        header .menu-icon span {
            display: block;
            width: 100%;
            height: 1px;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        /* Головний контент */
        .main-container {
            width: 100%;
            max-width: 600px;
            padding: 20px 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            z-index: 5;
        }

        /* Блок для розмитого фото */
        .photo-container {
            width: 85%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            margin: 0 auto 25px auto;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            filter: blur(8px);
            transform: scale(1.05);
        }

        /* Тексти */
        .title-couture {
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle-dev {
            font-size: 0.65rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 45px;
        }

        .manifesto {
            font-size: 0.85rem;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 2.2;
            margin-bottom: 40px;
        }

        /* Біле посилання для Request Access */
        .manifesto a {
            color: #ffffff;
            text-decoration: underline;
            transition: color 0.3s ease;
        }

        .manifesto a:hover {
            color: #aaaaaa;
        }

        /* Футер та іконки */
        footer {
            width: 100%;
            max-width: 600px;
            padding: 15px 25px 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .private-tg {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }

        .private-tg:hover {
            color: #aaaaaa;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-icons a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        /* Рівні розміри для всіх іконок, включаючи ТікТок */
        .social-icons svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .age-restriction {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            header .logo { font-size: 1.5rem; }
            .title-couture { font-size: 0.95rem; }
            .manifesto { font-size: 0.75rem; line-height: 2.0; }
            .photo-container { width: 90%; }
        }
    </style>
</head>
