<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk Magazine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Хедер / Шапка сайту */
        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 25px 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Тонке геометричне меню (три лінії) */
        header .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 14px;
            cursor: pointer;
        }

        header .menu-icon span {
            display: block;
            width: 100%;
            height: 1px; /* Дуже тонка лінія */
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        /* Головний контент по центру */
        .main-container {
            width: 100%;
            max-width: 600px;
            padding: 20px 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            z-index: 5;
        }

        /* Рамка для фото */
        .photo-frame {
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0px;
            margin-bottom: 25px;
            background-color: #000000;
            line-height: 0;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            object-fit: cover;
            /* Якщо захочеш додати легкий блюр прямо кодом, розкоментуй рядок нижче: */
            /* filter: blur(2px); */
        }

        /* Текстові блоки */
        .title-couture {
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle-dev {
            font-size: 0.65rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 45px;
        }

        /* Виправлений трирядковий маніфест */
        .manifesto {
            font-size: 0.85rem;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 2.2;
            margin-bottom: 40px;
        }

        /* Посилання на закритий ТГ */
        .tg-link {
            font-size: 0.8rem;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
            padding: 10px;
        }

        .tg-link:hover {
            color: #888888;
            letter-spacing: 4px;
        }

        /* Футер (Соцмережі та 18+) */
        footer {
            width: 100%;
            max-width: 600px;
            padding: 15px 25px 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        /* Блок іконок з Carrd (адаптовані, монохромні) */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; /* Заокруглені квадрати, як на скріншоті */
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .social-icons svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Обмеження 18+ */
        .age-restriction {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.6;
        }

        /* Адаптація під маленькі екрани (смартфони) */
        @media (max-width: 480px) {
            header .logo { font-size: 1.5rem; }
            .title-couture { font-size: 0.95rem; }
            .manifesto { font-size: 0.75rem; line-height: 2; }
            .photo-frame { max-width: 100%; }
        }
                .photo-container {
            width: 80%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            filter: blur(8px);
            transform: scale(1.05);
        }
        
    </style>
